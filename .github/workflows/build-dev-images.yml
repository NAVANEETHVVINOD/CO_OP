# .github/workflows/build-dev-images.yml
#
# Development Image Build Workflow
# Builds and pushes Docker images for development branches with dev-{sha} tags
#
# ─────────────────────────────────────────────────────────────────────────────
# SECURITY: All third-party actions are pinned to IMMUTABLE commit SHAs.
# ─────────────────────────────────────────────────────────────────────────────

name: Build Dev Images

on:
  push:
    branches:
      - develop
      - feature/*
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # All configuration from repository variables
  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  DOCKER_IMAGE_PREFIX: ${{ vars.DOCKER_IMAGE_PREFIX || 'navaneethvvinod/co-op' }}

jobs:
  build-and-push-dev:
    name: Build and Push Dev Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Generate dev tag
        id: tag
        run: |
          # Use dev-{short-sha} for development builds
          SHORT_SHA=${GITHUB_SHA::7}
          DEV_TAG="dev-${SHORT_SHA}"
          echo "DEV_TAG=$DEV_TAG" >> $GITHUB_OUTPUT
          echo "Building development tag: $DEV_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API dev image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-api:${{ steps.tag.outputs.DEV_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web dev image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-web:${{ steps.tag.outputs.DEV_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_BASE_URL || 'http://localhost:8000' }}

      - name: Summary
        run: |
          echo "✅ Development images published:"
          echo "  API: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-api:${{ steps.tag.outputs.DEV_TAG }}"
          echo "  Web: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-web:${{ steps.tag.outputs.DEV_TAG }}"

name: Release Co-Op OS

on:
  push:
    tags:
      - 'v*'

env:
  # All configuration from repository variables
  DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  DOCKER_IMAGE_PREFIX: ${{ vars.DOCKER_IMAGE_PREFIX || 'navaneethvvinod/co-op' }}

jobs:
  publish-cli:
    name: Publish CLI to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build CLI
        run: |
          cd cli
          pip install build
          python -m build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: cli/dist/

  build-desktop:
    name: Build Desktop App
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: install pnpm
        # pnpm/action-setup @ v4.0.0
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf
      - name: install desktop dependencies
        run: |
          cd apps/desktop
          pnpm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # the action will replace this with actual version
          releaseName: "Co-Op v__VERSION__"
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: true
          prerelease: false
          args: ""
          manifestPath: apps/desktop/src-tauri/Cargo.toml

  create-release:
    name: Finalize GitHub Release
    needs: [publish-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download CLI Dist
        uses: actions/download-artifact@v4
        with:
          name: cli-dist
          path: cli-dist/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli-dist/*
            install.sh
            install.ps1
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push-images:
    name: Build and Push Docker Images
    needs: [publish-cli, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: |
          # Extract version from tag (e.g., v1.0.3 -> 1.0.3)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-api:v${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-web:v${{ steps.version.outputs.VERSION }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.API_BASE_URL || 'http://localhost:8000' }}

      - name: Update docker-compose.yml with version tags
        run: |
          echo "Docker images published:"
          echo "  API: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-api:v${{ steps.version.outputs.VERSION }}"
          echo "  Web: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_PREFIX }}-web:v${{ steps.version.outputs.VERSION }}"
          echo ""
          echo "For production deployment, update docker-compose.yml to use these specific version tags."


# .github/workflows/advanced-security.yml
#
# Advanced Security Workflow - Comprehensive Supply Chain Protection
# Protects against sophisticated attacks including:
# - Malicious .pth files (LiteLLM-style attacks)
# - Typosquatting packages
# - Compromised maintainer accounts
# - Registry-native worms (Shai-Hulud style)
# - Crypto wallet hijacking
# - Credential harvesting
# - Backdoor installations
#
# ─────────────────────────────────────────────────────────────────────────────
# SECURITY: All third-party actions are pinned to IMMUTABLE commit SHAs.
# ─────────────────────────────────────────────────────────────────────────────

name: Advanced Security

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]
  schedule:
    - cron: "0 */6 * * *"   # Every 6 hours

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:

  # ── 1. Dependency Hash Verification ────────────────────────────────────────
  verify-lockfiles:
    name: Verify Dependency Lockfile Integrity
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Verify pnpm lockfile hasn't been tampered
        run: |
          echo "=== Verifying pnpm-lock.yaml integrity ==="
          
          # Check for suspicious patterns in lockfile
          if grep -qEi "postinstall.*curl|postinstall.*wget|postinstall.*bash|preinstall.*curl" pnpm-lock.yaml; then
            echo "🚨 SUSPICIOUS: Lockfile contains dangerous install scripts"
            exit 1
          fi
          
          echo "✅ pnpm lockfile looks clean"

      - name: Check for typosquatting in dependencies
        run: |
          echo "=== Checking for typosquatting attacks ==="
          
          # Known typosquatting patterns
          TYPOSQUAT_PATTERNS=(
            "reacct"
            "reqest"
            "pydantik"
            "sqlalchmy"
          )
          
          # Check only in actual dependency declarations (not all code)
          for pattern in "${TYPOSQUAT_PATTERNS[@]}"; do
            # Check package.json dependencies section only
            if jq -r '.dependencies, .devDependencies, .peerDependencies | keys[]' package.json 2>/dev/null | grep -qi "^${pattern}$"; then
              echo "🚨 POTENTIAL TYPOSQUATTING: Found suspicious package name: $pattern"
              exit 1
            fi
            # Check pyproject.toml dependencies section only
            if grep -E '^\s*"'"$pattern"'"' services/api/pyproject.toml 2>/dev/null; then
              echo "🚨 POTENTIAL TYPOSQUATTING: Found suspicious package name: $pattern"
              exit 1
            fi
          done
          
          echo "✅ No typosquatting patterns detected"

  # ── 2. Source Code Integrity Scan ──────────────────────────────────────────
  code-integrity:
    name: Source Code Integrity & Backdoor Detection
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Scan for obfuscated code
        run: |
          echo "=== Scanning for obfuscated/suspicious code ==="
          
          # Check for base64 encoded payloads
          SUSPICIOUS_FILES=$(grep -r "base64\|eval\|exec\|__import__" \
            --include="*.py" \
            --include="*.js" \
            --include="*.ts" \
            --exclude-dir=node_modules \
            --exclude-dir=.venv \
            --exclude-dir=.git \
            --exclude-dir=.next \
            . || true)
          
          if [ -n "$SUSPICIOUS_FILES" ]; then
            echo "⚠️  Found files with potentially suspicious patterns:"
            echo "$SUSPICIOUS_FILES"
            echo ""
            echo "Manual review required for these files."
          else
            echo "✅ No obvious obfuscation detected"
          fi

      - name: Check for credential harvesting patterns
        run: |
          echo "=== Checking for credential harvesting code ==="
          
          # Patterns from LiteLLM attack (excluding documentation and tests)
          HARVEST_PATTERNS=(
            "AWS_ACCESS_KEY.*requests\.post"
            "AWS_SECRET.*socket\.connect"
            "KUBECONFIG.*open.*w"
            "CI_JOB_TOKEN.*requests\.post"
            "GITHUB_TOKEN.*requests\.post.*443"
          )
          
          FOUND=0
          for pattern in "${HARVEST_PATTERNS[@]}"; do
            if grep -rE "$pattern" \
              --include="*.py" \
              --include="*.js" \
              --include="*.ts" \
              --exclude-dir=node_modules \
              --exclude-dir=.venv \
              --exclude-dir=.git \
              --exclude-dir=.github \
              --exclude-dir=tests \
              --exclude="*.md" \
              . 2>/dev/null | head -3; then
              echo "🚨 SUSPICIOUS: Found credential harvesting pattern: $pattern"
              FOUND=1
            fi
          done
          
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "⚠️  Potential credential harvesting detected. Manual review required."
            # Don't fail - just warn
          fi
          
          echo "✅ Credential harvesting check complete"

      - name: Detect crypto wallet hijacking code
        run: |
          echo "=== Checking for crypto wallet hijacking (npm attack pattern) ==="
          
          # Patterns from 2026 npm supply chain attack (excluding docs and examples)
          if grep -rE "(fetch|XMLHttpRequest)\.prototype\..*=.*function.*replace.*(0x[0-9a-fA-F]{40}|bc1[a-zA-Z0-9]{39,59})" \
            --include="*.js" \
            --include="*.ts" \
            --exclude-dir=node_modules \
            --exclude-dir=.next \
            --exclude-dir=docs \
            --exclude-dir=examples \
            --exclude="*.md" \
            . 2>/dev/null; then
            echo "🚨 SUSPICIOUS: Found potential crypto wallet hijacking code"
            exit 1
          fi
          
          echo "✅ No crypto wallet hijacking detected"

  # ── 3. Dependency Provenance Verification ──────────────────────────────────
  verify-provenance:
    name: Verify Package Provenance
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/api
        run: pip install -e .

      - name: Check for unsigned packages
        run: |
          echo "=== Checking Python package signatures ==="
          
          # List all installed packages
          pip list --format=json > installed_packages.json
          
          # Check for packages without proper metadata
          python3 << 'EOF'
          import json
          import sys
          
          with open('installed_packages.json') as f:
              packages = json.load(f)
          
          suspicious = []
          for pkg in packages:
              name = pkg['name']
              # Skip our own packages
              if name in ['co-op-api', 'coop-cli']:
                  continue
              
              # Check for suspicious version patterns (e.g., 1.82.7, 1.82.8)
              version = pkg['version']
              if 'litellm' in name.lower() and version in ['1.82.7', '1.82.8']:
                  print(f"🚨 BLOCKED: Compromised LiteLLM version detected: {version}")
                  sys.exit(1)
          
          print("✅ No compromised package versions detected")
          EOF

  # ── 4. Runtime Behavior Monitoring ─────────────────────────────────────────
  runtime-monitoring:
    name: Monitor for Suspicious Runtime Behavior
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Monitor package installation for suspicious activity
        working-directory: services/api
        run: |
          echo "=== Monitoring pip install for suspicious behavior ==="
          
          # Install with verbose logging
          pip install -e . -v 2>&1 | tee install.log
          
          # Check for suspicious network activity during install
          if grep -qE "Downloading.*\.onion|Downloading.*pastebin|Downloading.*discord" install.log; then
            echo "🚨 SUSPICIOUS: Package attempted to download from suspicious domain"
            exit 1
          fi
          
          # Check for suspicious file operations
          if grep -qE "Writing.*\.ssh|Writing.*\.aws|Writing.*\.kube" install.log; then
            echo "🚨 SUSPICIOUS: Package attempted to write to sensitive directories"
            exit 1
          fi
          
          echo "✅ No suspicious installation behavior detected"

  # ── 5. SBOM Generation & Analysis ──────────────────────────────────────────
  sbom-analysis:
    name: Generate and Analyze SBOM
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Generate Python SBOM
        working-directory: services/api
        run: |
          pip install cyclonedx-bom
          pip freeze > requirements-freeze.txt
          cyclonedx-py requirements \
            -i requirements-freeze.txt \
            -o sbom-python.json \
            --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: sbom-artifacts
          path: services/api/sbom-python.json
          retention-days: 90

  # ── 6. Secret Scanning ─────────────────────────────────────────────────────
  secret-scan:
    name: Scan for Leaked Secrets
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          # Install gitleaks
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          
          # Scan for secrets (using .gitleaks.toml for allowlist)
          ./gitleaks detect --source . --verbose --no-git --config .gitleaks.toml || {
            echo "🚨 SECRETS DETECTED: Leaked credentials found in codebase"
            exit 1
          }
          
          echo "✅ No secrets detected"

  # ── 7. Dependency Confusion Check ──────────────────────────────────────────
  dependency-confusion:
    name: Check for Dependency Confusion Attacks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Check for internal package name conflicts
        run: |
          echo "=== Checking for dependency confusion vulnerabilities ==="
          
          # Our internal packages
          INTERNAL_PACKAGES=("co-op-api" "coop-cli" "web")
          
          for pkg in "${INTERNAL_PACKAGES[@]}"; do
            # Check if package exists on public PyPI
            if curl -s "https://pypi.org/pypi/$pkg/json" | grep -q "\"name\""; then
              echo "⚠️  WARNING: Internal package name '$pkg' exists on public PyPI"
              echo "   This could lead to dependency confusion attacks"
            fi
          done
          
          echo "✅ Dependency confusion check complete"

  # ── 8. License Compliance ──────────────────────────────────────────────────
  license-check:
    name: Verify License Compliance
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Check for GPL/AGPL licenses
        working-directory: services/api
        run: |
          pip install pip-licenses
          pip install -e .
          
          # Check for copyleft licenses
          if pip-licenses --format=json | grep -qE "GPL|AGPL"; then
            echo "⚠️  WARNING: Found GPL/AGPL licensed dependencies"
            pip-licenses --format=markdown | grep -E "GPL|AGPL"
            echo ""
            echo "Review these licenses for compliance with your project"
          fi
          
          echo "✅ License check complete"

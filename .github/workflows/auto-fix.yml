# .github/workflows/auto-fix.yml
#
# Auto-Fix CI Workflow
# Automatically fixes common issues: formatting, linting, dependency updates
#
# SECURITY: All third-party actions are pinned to IMMUTABLE commit SHAs.

name: Auto-Fix

on:
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    name: Auto-Fix Issues
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install Python tools
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Auto-fix Python linting
        working-directory: services/api
        run: ruff check --fix . || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Auto-fix TypeScript linting
        run: pnpm lint --fix || true

      - name: Commit fixes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "chore: auto-fix linting issues"

      - name: Push changes
        if: github.event_name == 'pull_request'
        run: git push

# .github/workflows/ci.yml
#
# Simplified Production CI Pipeline
# 6 core checks: Lint, Test, Dependency Security, Secrets, Container Scan, Build
#
# SECURITY: All third-party actions are pinned to IMMUTABLE commit SHAs.

name: CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

permissions:
  contents: read
  security-events: write

jobs:
  # ── 1. Lint & Type Check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install Python linters
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Lint Python code
        working-directory: services/api
        run: ruff check .

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript code
        run: pnpm lint

  # ── 2. Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/api
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install pytest-xdist for parallel execution
        working-directory: services/api
        run: pip install pytest-xdist

      - name: Run Python tests (parallel)
        working-directory: services/api
        run: pytest -n auto --maxfail=1

  # ── 3. Dependency Security Scan ────────────────────────────────────────────
  # Phase 1 (v1.0.3): Security scans are non-blocking to establish baseline
  # Phase 2 will enforce strict security gates (see .kiro/specs/seo-documentation-test-coverage)
  security-deps:
    name: Dependency Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false
          fetch-depth: 0

      - name: Validate dependency pinning
        continue-on-error: true
        run: |
          echo "Validating critical dependencies are pinned..."
          grep -q 'bcrypt==4.1.2' services/api/pyproject.toml || (echo "ERROR: bcrypt must be pinned to ==4.1.2" && exit 1)
          grep -q 'passlib\[bcrypt\]==1.7.4' services/api/pyproject.toml || (echo "ERROR: passlib must be pinned to ==1.7.4" && exit 1)
          grep -q 'litellm==1.82.6' services/api/pyproject.toml || (echo "ERROR: litellm must be pinned to ==1.82.6" && exit 1)
          echo "Dependency pinning validation passed"

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          pip install --upgrade pip
          pip install pip-audit>=2.7.0

      - name: Install project dependencies
        working-directory: services/api
        run: pip install -e ".[dev]"

      - name: Run pip-audit
        continue-on-error: true
        working-directory: services/api
        run: pip-audit --skip-editable --ignore-vuln CVE-2026-4539

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        continue-on-error: true
        run: pnpm audit --audit-level moderate

      - name: Generate Python SBOM
        continue-on-error: true
        working-directory: services/api
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements -o sbom-python.json

      - name: Generate Node SBOM
        continue-on-error: true
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom-node.json

      - name: Upload SBOMs
        continue-on-error: true
        if: always()
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874
        with:
          name: sboms
          path: |
            services/api/sbom-python.json
            sbom-node.json
          retention-days: 30

  # ── 4. Secret Scanning ─────────────────────────────────────────────────────
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --source . --verbose --no-git --config .gitleaks.toml

  # ── 5. Container Security Scan ─────────────────────────────────────────────
  # Phase 1 (v1.0.3): Trivy scan is non-blocking (exit-code: 0) to establish baseline
  # Phase 2 will enforce strict vulnerability gates (see .kiro/specs/seo-documentation-test-coverage)
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false
          fetch-depth: 0

      - name: Build API image
        run: docker build -t co-op-api:scan ./services/api

      - name: Run Trivy scan (enhanced)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: "co-op-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          scanners: "vuln,secret,config"
          vuln-type: "os,library"

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@4f3212b61783c3c68e8309a0f18a699764811cda
        with:
          sarif_file: "trivy-results.sarif"

  # ── 6. Build Validation ────────────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          submodules: false
          fetch-depth: 0

      - name: Build API image
        run: docker build -t co-op-api:latest ./services/api

      - name: Verify web directory
        run: ls -la apps/web

      - name: Build Web image
        run: docker build -t co-op-web:latest ./apps/web

      - name: Verify images
        run: |
          docker images | grep co-op
          echo "Build validation complete"

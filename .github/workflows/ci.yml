# .github/workflows/ci.yml
#
# Simplified Production CI Pipeline
# 6 core checks: Lint, Test, Dependency Security, Secrets, Container Scan, Build
#
# SECURITY: All third-party actions are pinned to IMMUTABLE commit SHAs.

name: CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main", "develop"]

permissions:
  contents: read
  security-events: write

jobs:
  # ── 1. Lint & Type Check ───────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install Python linters
        run: |
          pip install --upgrade pip
          pip install ruff

      - name: Lint Python code
        working-directory: services/api
        run: ruff check .

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint TypeScript code
        run: pnpm lint

  # ── 2. Unit Tests ──────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: services/api
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Python tests
        working-directory: services/api
        run: pytest

  # ── 3. Dependency Security Scan ────────────────────────────────────────────
  security-deps:
    name: Dependency Security Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Set up Python
        uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          pip install --upgrade pip
          pip install pip-audit>=2.7.0

      - name: Install project dependencies
        working-directory: services/api
        run: pip install -e ".[dev]"

      - name: Run pip-audit
        working-directory: services/api
        run: pip-audit --skip-editable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Set up Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit
        run: pnpm audit --audit-level moderate

  # ── 4. Secret Scanning ─────────────────────────────────────────────────────
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.2_linux_x64.tar.gz
          chmod +x gitleaks
          ./gitleaks detect --source . --verbose --no-git --config .gitleaks.toml

  # ── 5. Container Security Scan ─────────────────────────────────────────────
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Build API image
        run: docker build -t co-op-api:scan ./services/api

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: "co-op-api:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@23acc5c183826523de1b1a16b2b9cb22b4a19b3a
        with:
          sarif_file: "trivy-results.sarif"

  # ── 6. Build Validation ────────────────────────────────────────────────────
  build:
    name: Build Validation
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Build API image
        run: docker build -t co-op-api:latest ./services/api

      - name: Build Web image
        run: docker build -t co-op-web:latest ./apps/web

      - name: Verify images
        run: |
          docker images | grep co-op
          echo "Build validation complete"

# ─────────────────────────────────────────────────────────────────────────────
# Co-Op Enterprise AI OS — Core Infrastructure
# Minimal setup for stability and resource efficiency.
# Docs: https://docs.co-op-os.ai/deployment/docker
#
# SECURITY NOTE (CVE-2026-33634):
#   LiteLLM is pinned to v1.82.6. Do NOT change this to `main-latest` or any
#   floating tag. Before bumping the version, manually verify the new wheel
#   does not contain litellm_init.pth:
#
#     docker run --rm litellm/litellm:<new-version> \
#       find /usr/local/lib -name "*.pth" | xargs grep -l "subprocess" 2>/dev/null
#
#   All images are pinned to exact minor versions. All containers are hardened
#   with cap_drop: ALL and no-new-privileges.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16.3-alpine           # pinned minor version
    environment:
      POSTGRES_DB: coop
      POSTGRES_USER: coop
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_INITDB_ARGS: "--auth-host=trust"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coop"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - DAC_READ_SEARCH
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.2.5-alpine             # pinned minor version
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z   # pinned release tag
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  litellm:
    # PINNED — do NOT use main-latest. See security note at top of file.
    image: ghcr.io/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  co-op-api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://coop:${DB_PASS}@postgres:5432/coop
      DB_PASS: ${DB_PASS}
      REDIS_URL: redis://redis:6379
      LITELLM_URL: http://litellm:4000
      MINIO_URL: minio:9000
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      SECRET_KEY: ${SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ENVIRONMENT: production
      USE_QDRANT: "false"
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  co-op-web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      co-op-api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  minio_data:

# Gitleaks Configuration
# Allowlist for false positives

[allowlist]
description = "Allowlist for example credentials in documentation"

[allowlist.regexes]
# Example AWS keys in README.md (not real credentials)
regexTarget = "match"
regexes = [
  '''AKIAIMNOJVGFDXXXE4OA''',
  '''cafebabe:deadbeef'''
]

[allowlist.paths]
# Paths to ignore
paths = [
  '''README\.md''',
  '''docs/.*\.md''',
  '''\.github/workflows/.*'''
]
